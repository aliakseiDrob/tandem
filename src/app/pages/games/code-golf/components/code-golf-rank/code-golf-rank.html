<div class="best-result">
  @if (previousBest(); as best) {
  <div class="record-badge">
    <span class="label">Your best result:</span>
    <span class="value">{{ best }} Bytes</span>
  </div>

  <div
    class="diff-indicator"
    [class.is-visible]="diffInfo()"
    [class.progress]="diffInfo()?.isProgress"
    [class.regress]="diffInfo()?.isRegress">
    @if (diffInfo(); as diff) { {{ diff.value }} Bytes
    <span class="diff-label">({{ diff.label }})</span>
    }
  </div>
  }
</div>

<div class="game-info">
  @if (rank(); as currentRank) {
  <div class="rank-info" [style.border-left-color]="currentRank.color">
    <span class="icon">{{ currentRank.icon }}</span>
    <div class="details">
      <div class="rank" [style.color]="currentRank.color">{{ currentRank.label }}</div>
      <div class="bytes-amount">{{ byteCount() }} Bytes</div>
    </div>
  </div>

  <div class="rank-progress">
    <div class="progress-fill" [style.background-color]="currentRank.color" [style.width.%]="currentRank.width"></div>
  </div>
  }
</div>

<h3>Final Call Stack</h3>

<ul class="final-stack-content">
  @for (item of codeBlocks(); track item.executionOrder) {
  <li
    class="list-item"
    tndm-code-block
    [cdkDragData]="item"
    [cdkDragDisabled]="true"
    [class.is-hidden]="invisibleCodeBlocks().includes(item)"
    [executionOrder]="item.executionOrder"
    [inFinalStack]="true">
    <pre>{{ item.code }}</pre>
  </li>
  }
</ul>

<form class="form__wrapper" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__body">
    <tndm-input
      label="Password"
      name="password"
      [errorMessages]="AUTH_ERROR_MESSAGES"
      [formControl]="passwordControl"
      [id]="'password'"
      [placeholder]="'Enter password'"
      [type]="'password'" />
  </div>
  <div class="form__footer">
    <tndm-button [btnConfig]="updatePasswordBtnConfig()" />
    <h5 class="form__subtitle">Continue without changes?</h5>
    <tndm-button [btnConfig]="toMainBtnConfig()" (click)="navigateToMain()" />
  </div>
</form>
